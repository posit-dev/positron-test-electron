name: tests

on:
  workflow_dispatch:
  workflow_call: # allow other workflows (e.g. release.yml) to reuse this matrix as a gate
  push:
    branches: ["main"]
  pull_request:

jobs:
  unit:
    name: "Unit tests (${{ matrix.os }}, Node ${{ matrix.node-version }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ["20", "24"] # lowest and highest supported versions
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  integration:
    name: "Integration test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Electron needs a display on Linux; run the extension host under Xvfb.
      - name: Run integration test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration
      - name: Run integration test
        if: runner.os != 'Linux'
        run: npm run test:integration

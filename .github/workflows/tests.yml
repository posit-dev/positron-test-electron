name: tests

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

jobs:
  unit:
    name: "Unit tests (Node ${{ matrix.node-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "24"] # lowest and highest supported versions
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  integration:
    name: "Integration test (macOS)"
    runs-on: macos-latest # v1 supports macOS only (arm64 + x64)
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run integration test
        run: npm run test:integration

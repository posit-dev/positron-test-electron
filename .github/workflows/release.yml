name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: macos-latest # v1 supports macOS only; the integration test requires it

    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.2'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm # trusted publishing requires npm >= 11.5.1; Node 20 ships npm 10.x
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test:integration

      - name: Set version from release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Publishing version: $VERSION"

      - name: Publish to npm # auth via OIDC trusted publishing — no token needed
        run: npm publish --access public

name: Release

on:
  release:
    types: [published]

jobs:
  # Gate publishing on the full cross-platform matrix (unit + integration on
  # macOS/Windows/Linux) by reusing tests.yml — no duplicated CI config here.
  test:
    uses: ./.github/workflows/tests.yml

  release:
    needs: test
    runs-on: ubuntu-latest # npm package is platform-agnostic; cross-platform tests run in the `test` job

    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # bundles npm >= 11.5.1 (from 24.5.0), required for trusted publishing (OIDC)
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set version from release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "Publishing version: $VERSION"

      - name: Publish to npm # auth via OIDC trusted publishing — no token needed
        run: npm publish --access public
